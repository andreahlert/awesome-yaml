<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#bg)" />
  <!-- YAML structure visualization -->
  <!-- Key-value pairs -->
  <g font-family="monospace, 'Courier New'" fill="#fef2f2" opacity="0.9">
    <text x="48" y="55" font-size="13" font-weight="600">name:</text>
    <text x="105" y="55" font-size="13" fill="#fca5a5">yaml</text>
    <text x="48" y="73" font-size="13" font-weight="600">type:</text>
    <text x="100" y="73" font-size="13" fill="#fca5a5">data</text>
    <text x="48" y="91" font-size="13" font-weight="600">items:</text>
    <!-- Indented list items -->
    <text x="58" y="109" font-size="13" fill="#fca5a5">- tools</text>
    <text x="58" y="127" font-size="13" fill="#fca5a5">- parsers</text>
    <text x="58" y="145" font-size="13" fill="#fca5a5">- linters</text>
  </g>
  <!-- Bracket decoration -->
  <path d="M38 42 L38 150" stroke="#fef2f2" stroke-width="2" opacity="0.3" stroke-linecap="round"/>
  <!-- Text -->
  <text x="100" y="178" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="700" font-size="14" fill="white" letter-spacing="1">AWESOME YAML</text>
</svg>
